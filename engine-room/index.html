<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>MotionC Engine Room</title>

    <link
        rel="stylesheet"
        href="/engine-room/styles.css?v=23"
    >

    <script
        src="/engine-room/script.js?v=18"
        defer
    ></script>

</head>

<body>

    <main class="engine-room-stage">

        <img
            src="/images/Engine-Room.png"
            alt="MotionC Engine Room"
            class="engine-room-image"
        >

        <!-- =====================================
             LIVE TOP DISPLAYS
        ====================================== -->

        <div
            id="mcp-display"
            class="engine-display engine-display-mcp"
            aria-label="Current MCP"
        >
            --
        </div>

        <div
            id="journey-display"
            class="engine-display engine-display-journey"
            aria-label="Journey to next level"
        >
            --%
        </div>

        <div
            id="bmi-display"
            class="engine-display engine-display-bmi"
            aria-label="Current BMI"
        >
            --
        </div>

        <!-- =====================================
             COMBINED JOURNEY SLIDER
        ====================================== -->

        <div class="combined-slider-area">
            <input
                id="combined-slider"
                class="combined-slider-input"
                type="range"
                min="-40"
                max="20"
                step="1"
                value="0"
                aria-label="Combined weight and waist simulation slider"
            >
            <div
                class="combined-slider-handle"
                aria-hidden="true"
            ></div>
        </div>

        <div id="combined-change-display" class="change-display combined-change-display">0 lb<br>0.0"</div>
        <div class="change-heading combined-change-heading">WEIGHT &amp; WAIST</div>
        <div id="combined-impact-display" class="impact-display combined-impact-display">0.0</div>

        <!-- =====================================
             WEIGHT-ONLY SLIDER
        ====================================== -->

        <div class="weight-slider-area">

            <input
                id="weight-slider"
                class="weight-slider-input"
                type="range"
                min="156.5"
                max="216.5"
                step="0.5"
                value="200"
                aria-label="Weight-only simulation slider"
            >

            <div
                id="weight-slider-handle"
                class="weight-slider-handle"
                aria-hidden="true"
            ></div>

        </div>

        <!-- Temporary value readout -->
        <div
            id="weight-test-display"
            class="change-display weight-test-display"
            aria-live="polite"
        >
            196.5
        </div>
        <div class="change-heading weight-change-heading">WEIGHT</div>

        <div id="weight-impact-display" class="impact-display weight-impact-display">0.0</div>

        <!-- =====================================
             WAIST-ONLY SLIDER
        ====================================== -->

        <div class="waist-slider-area">

            <input
                id="waist-slider"
                class="waist-slider-input"
                type="range"
                min="32"
                max="44"
                step="0.1"
                value="40"
                aria-label="Waist-only simulation slider"
            >

            <div
                id="waist-slider-handle"
                class="waist-slider-handle"
                aria-hidden="true"
            ></div>

        </div>
                <!-- Temporary waist value -->
        <div
            id="waist-test-display"
            class="change-display waist-test-display"
            aria-live="polite"
        >
            40.0"
        </div>
        <div class="change-heading waist-change-heading">WAIST</div>

        <div id="waist-impact-display" class="impact-display waist-impact-display">0.0</div>

        <!-- Active MCP tier outline: Core, Healthy, Elevated, Watch -->
        <div
            id="active-tier-indicator"
            class="active-tier-indicator"
            role="button"
            tabindex="0"
        >
            <span id="active-tier-label" class="active-tier-label"></span>
            <span
                id="active-tier-tooltip"
                class="active-tier-tooltip"
                role="tooltip"
            ></span>
        </div>

        <section
            class="population-counts"
            aria-labelledby="population-counts-title"
        >
            <h2 id="population-counts-title">Population Credibility (200)</h2>
            <div id="population-counts-body"></div>
        </section>

        <section
            class="population-summary"
            aria-labelledby="population-summary-title"
        >
            <div class="population-summary-header">
                <h2 id="population-summary-title">Sample Simulations (6 of 200)</h2>
                <button
                    id="refresh-population-button"
                    type="button"
                    aria-label="Generate six new sample profiles"
                >
                    ↻ New Samples
                </button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th scope="col">Weight</th>
                        <th scope="col">Waist</th>
                        <th scope="col">MCP</th>
                        <th scope="col">Result</th>
                    </tr>
                </thead>
                <tbody id="population-summary-body"></tbody>
            </table>
        </section>

        <!-- =====================================
             EXIT
        ====================================== -->

        <a
            href="/dashboard/"
            class="exit-hotspot"
            aria-label="Exit Engine Room and return to MCP Control"
        ></a>

    </main>

</body>

</html>
