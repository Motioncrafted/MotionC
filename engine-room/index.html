<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MotionC Engine Room</title>

    <link rel="stylesheet" href="/engine-room/styles.css?v=6">
    <script src="/engine-room/script.js?v=1" defer></script>
</head>

<body>

    <div class="engine-room-stage">

        <img
            src="/images/Engine-Room.png"
            alt="MotionC Engine Room"
            class="engine-room-image"
        >

        <!-- Live Engine Room displays -->
        <div
            id="mcp-display"
            class="engine-display engine-display-mcp"
            aria-label="Current MCP"
        >
            --
        </div>

        <div
            id="journey-display"
            class="engine-display engine-display-journey"
            aria-label="Journey to next level"
        >
            --%
        </div>

        <div
            id="bmi-display"
            class="engine-display engine-display-bmi"
            aria-label="Current BMI"
        >
            --
        </div>

        <a
            href="/dashboard/"
            class="exit-hotspot"
            aria-label="Exit Engine Room and return to MCP Control"
        ></a>

    </div>

</body>

</html>
