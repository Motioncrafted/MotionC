<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MotionC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
   
</head>

<body>

    <img
        class="dashboard-image"
        src="../images/dashboard-master.png"
        alt="MotionC Dashboard"
    >
<!-- Invisible clickable zone over the K-Score icon -->
<div id="kscore-button"></div>

    <!-- Temporarily left open while we design and test the form -->
    <div class="drawer-overlay open"></div>

    <aside class="input-drawer open" aria-label="K-Score information form">

        <header class="drawer-header">
            <h1>Update My Information</h1>
            <p>Complete your measurements and Lifestyle Checklist.</p>
        </header>

        <form id="kscore-form">

            <fieldset>
                <legend>My Measurements</legend>

                <div class="field">
                    <label for="units">Measurement system</label>
                    <select id="units" name="units">
                        <option value="imperial">Imperial — lb, ft/in</option>
                        <option value="metric">Metric — kg, cm</option>
                    </select>
                </div>

                <div class="two-column">
                    <div class="field">
                        <label for="weight">Weight</label>
                        <input id="weight" name="weight" type="number" step="0.1">
                    </div>

                    <div class="field">
                        <label for="waist">Waist</label>
                        <input id="waist" name="waist" type="number" step="0.1">
                    </div>
                </div>

                <div class="two-column">
                    <div class="field">
                        <label for="height-feet">Height — feet</label>
                        <input id="height-feet" name="heightFeet" type="number">
                    </div>

                    <div class="field">
                        <label for="height-inches">Height — inches</label>
                        <input id="height-inches" name="heightInches" type="number">
                    </div>
                </div>

                <div class="two-column">
                    <div class="field">
                        <label for="age">Age</label>
                        <input id="age" name="age" type="number">
                    </div>

                    <div class="field">
                        <label for="sex">Sex</label>
                        <select id="sex" name="sex">
                            <option value="">Choose</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Lifestyle Checklist</legend>

                <div class="lifestyle-item">
                    <h3>Smoking</h3>

                    <label class="choice">
                        <input type="radio" name="smoking" value="2">
                        <span>Healthy choice</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="smoking" value="1">
                        <span>Partial or improving</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="smoking" value="0">
                        <span>Needs attention</span>
                    </label>
                </div>

                <div class="lifestyle-item">
                    <h3>Sleep</h3>

                    <label class="choice">
                        <input type="radio" name="sleep" value="2">
                        <span>Healthy choice</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="sleep" value="1">
                        <span>Partial or improving</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="sleep" value="0">
                        <span>Needs attention</span>
                    </label>
                </div>

                <div class="lifestyle-item">
                    <h3>Stress</h3>

                    <label class="choice">
                        <input type="radio" name="stress" value="2">
                        <span>Healthy choice</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="stress" value="1">
                        <span>Partial or improving</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="stress" value="0">
                        <span>Needs attention</span>
                    </label>
                </div>

                <div class="lifestyle-item">
                    <h3>Daily Movement</h3>

                    <label class="choice">
                        <input type="radio" name="dailyMovement" value="2">
                        <span>Healthy choice</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="dailyMovement" value="1">
                        <span>Partial or improving</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="dailyMovement" value="0">
                        <span>Needs attention</span>
                    </label>
                </div>

                <div class="lifestyle-item">
                    <h3>Nutrition</h3>

                    <label class="choice">
                        <input type="radio" name="nutrition" value="2">
                        <span>Healthy choice</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="nutrition" value="1">
                        <span>Partial or improving</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="nutrition" value="0">
                        <span>Needs attention</span>
                    </label>
                </div>

                <div class="lifestyle-item">
                    <h3>Alcohol</h3>

                    <label class="choice">
                        <input type="radio" name="alcohol" value="2">
                        <span>Healthy choice</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="alcohol" value="1">
                        <span>Partial or improving</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="alcohol" value="0">
                        <span>Needs attention</span>
                    </label>
                </div>

                <div class="lifestyle-item">
                    <h3>Hydration</h3>

                    <label class="choice">
                        <input type="radio" name="hydration" value="2">
                        <span>Healthy choice</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="hydration" value="1">
                        <span>Partial or improving</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="hydration" value="0">
                        <span>Needs attention</span>
                    </label>
                </div>

                <div class="lifestyle-item">
                    <h3>Lifestyle Item 8 — wording to confirm</h3>

                    <label class="choice">
                        <input type="radio" name="lifestyleItem8" value="2">
                        <span>Healthy choice</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="lifestyleItem8" value="1">
                        <span>Partial or improving</span>
                    </label>

                    <label class="choice">
                        <input type="radio" name="lifestyleItem8" value="0">
                        <span>Needs attention</span>
                    </label>
                </div>

            </fieldset>

            <button class="calculate-button" type="submit">
                Calculate My Results
            </button>

        </form>
    </aside>
        <script src="script.js"></script>
</body>
</html>
