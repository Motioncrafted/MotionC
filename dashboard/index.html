<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotionC Dashboard</title>

    <link rel="stylesheet" href="/dashboard/styles.css?v=2">
</head>

<body>

    <!-- Dashboard Image Wrapper -->
    <div class="dashboard-wrapper">
        <img
            class="dashboard-image"
            src="/images/dashboard-master.png"
            alt="MotionC Dashboard"
        >

        <!-- Visible (blue) button -->
        <div id="kscore-button"></div>
    </div>

    <!-- Drawer overlay -->
    <div class="drawer-overlay"></div>

    <!-- Drawer -->
    <aside class="input-drawer" aria-label="K-Score information form">

        <header class="drawer-header">
            <button class="drawer-close-btn" aria-label="Close drawer">✕</button>

            <h1>Update My Information</h1>
            <p>Complete your measurements and Lifestyle Checklist.</p>
        </header>

        <!-- ========================= -->
        <!--         FULL FORM         -->
        <!-- ========================= -->
        <form id="kscore-form">

            <!-- ========================= -->
            <!--       MEASUREMENTS        -->
            <!-- ========================= -->
            <fieldset>
                <legend>My Measurements</legend>

                <!-- Measurement System (small radio buttons, no label) -->
                <div class="measurement-system">
                    <div class="ms-options">
                        <label class="ms-option">
                            <input type="radio" name="measurementSystem" value="imperial" checked>
                            Imperial
                        </label>

                        <label class="ms-option">
                            <input type="radio" name="measurementSystem" value="metric">
                            Metric
                        </label>
                    </div>
                </div>

                <div class="two-column small-fields">
                    <div class="field">
                        <label for="weight">Weight</label>
                        <input id="weight" name="weight" type="number" step="0.1">
                    </div>

                    <div class="field">
                        <label for="waist">Waist</label>
                        <input id="waist" name="waist" type="number" step="0.1">
                    </div>
                </div>

                <div class="two-column small-fields">
                    <div class="field">
                        <label for="height-feet">Height — ft</label>
                        <input id="height-feet" name="heightFeet" type="number">
                    </div>

                    <div class="field">
                        <label for="height-inches">Height — in</label>
                        <input id="height-inches" name="heightInches" type="number">
                    </div>
                </div>

                <div class="two-column small-fields">
                    <div class="field">
                        <label for="age">Age</label>
                        <input id="age" name="age" type="number">
                    </div>

                    <div class="field">
                        <label for="sex">Sex</label>
                        <select id="sex" name="sex">
                            <option value="">Choose</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- Divider -->
            <hr class="form-divider">

            <!-- ========================= -->
            <!--     8-POINT LIFESTYLE     -->
            <!-- ========================= -->
            <fieldset>
                <legend>Lifestyle Checklist</legend>

                <!-- Sleep Quality -->
                <div class="quiz-group">
                    <label class="quiz-heading">Sleep Quality</label>
                    <div class="quiz-options small-checks">
                        <label><input type="checkbox" name="sleep" value="7-8"> 7–8 hours</label>
                        <label><input type="checkbox" name="sleep" value="6"> 6 hours</label>
                        <label><input type="checkbox" name="sleep" value="<6"> Less than 6</label>
                    </div>
                </div>

                <!-- Hydration -->
                <div class="quiz-group">
                    <label class="quiz-heading">Hydration</label>
                    <div class="quiz-options small-checks">
                        <label><input type="checkbox" name="hydration" value="high"> High</label>
                        <label><input type="checkbox" name="hydration" value="adequate"> Adequate</label>
                        <label><input type="checkbox" name="hydration" value="low"> Low</label>
                    </div>
                </div>

                <!-- Nutrition -->
                <div class="quiz-group">
                    <label class="quiz-heading">Nutrition</label>
                    <div class="quiz-options small-checks">
                        <label><input type="checkbox" name="nutrition" value="balanced"> Mostly Balanced</label>
                        <label><input type="checkbox" name="nutrition" value="mixed"> Mixed</label>
                        <label><input type="checkbox" name="nutrition" value="poor"> Poor</label>
                    </div>
                </div>

                <!-- Activity Level -->
                <div class="quiz-group">
                    <label class="quiz-heading">Activity Level</label>
                    <div class="quiz-options small-checks">
                        <label><input type="checkbox" name="activity" value="8k"> 8k+ steps/day</label>
                        <label><input type="checkbox" name="activity" value="3-4k"> 3–4k steps/day</label>
                        <label><input type="checkbox" name="activity" value="<3k"> Less than 3k</label>
                    </div>
                </div>

                <!-- Stress Management -->
                <div class="quiz-group">
                    <label class="quiz-heading">Stress Management</label>
                    <div class="quiz-options small-checks">
                        <label><input type="checkbox" name="stress" value="low"> Low</label>
                        <label><input type="checkbox" name="stress" value="moderate"> Moderate</label>
                        <label><input type="checkbox" name="stress" value="high"> High</label>
                    </div>
                </div>

                <!-- Alcohol Intake -->
                <div class="quiz-group">
                    <label class="quiz-heading">Alcohol Intake</label>
                    <div class="quiz-options small-checks">
                        <label><input type="checkbox" name="alcohol" value="low"> Low</label>
                        <label><input type="checkbox" name="alcohol" value="moderate"> Moderate</label>
                        <label><input type="checkbox" name="alcohol" value="high"> High</label>
                    </div>
                </div>

                <!-- Smoking Status -->
                <div class="quiz-group">
                    <label class="quiz-heading">Smoking Status</label>
                    <div class="quiz-options small-checks">
                        <label><input type="checkbox" name="smoking" value="none"> None</label>
                        <label><input type="checkbox" name="smoking" value="former"> Former Smoker</label>
                        <label><input type="checkbox" name="smoking" value="current"> Current Smoker</label>
                    </div>
                </div>

                <!-- Daily Movement -->
                <div class="quiz-group">
                    <label class="quiz-heading">Daily Movement</label>
                    <div class="quiz-options small-checks">
                        <label><input type="checkbox" name="movement" value="high"> High</label>
                        <label><input type="checkbox" name="movement" value="moderate"> Moderate</label>
                        <label><input type="checkbox" name="movement" value="low"> Low</label>
                    </div>
                </div>

            </fieldset>

            <button type="submit" class="submit-btn">Save My Info</button>

        </form>
    </aside>

    <!-- Load dashboard JS -->
    <script src="/dashboard/script.js?v=2"></script>

</body>
</html>
