<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MotionC Dashboard</title>

    <link rel="stylesheet" href="/dashboard/styles.css">
</head>

<body>

    <!-- Main content -->
    <main class="main-content">

        <div class="dashboard-wrapper">

            <img
                class="dashboard-image"
                src="/images/dashboard-master.png"
                alt="MotionC Dashboard"
            >

            <!-- MCP hotspot -->
            <div
                id="kscore-button"
                role="button"
                tabindex="0"
                aria-label="Open MCP information form"
            ></div>

        </div>

    </main>

    <!-- Overlay -->
    <div class="drawer-overlay"></div>

    <!-- Drawer -->
    <aside class="input-drawer" aria-hidden="true">

        <header class="drawer-header">

            <button
                class="drawer-close-btn"
                type="button"
                aria-label="Close form"
            >
                ✕
            </button>

            <h1>Update My Information</h1>

            <p>
                Complete your measurements and Lifestyle Checklist.
            </p>

        </header>

        <form id="kscore-form">

            <fieldset>

                <legend>My Measurements</legend>

                <div class="ms-options">

                    <label class="ms-option">
                        <input
                            type="radio"
                            name="measurementSystem"
                            value="imperial"
                            checked
                        >
                        Imperial
                    </label>

                    <label class="ms-option">
                        <input
                            type="radio"
                            name="measurementSystem"
                            value="metric"
                        >
                        Metric
                    </label>

                </div>

                <div class="two-column">

                    <div class="field">
                        <label for="weight">Weight</label>

                        <input
                            id="weight"
                            type="number"
                            step="0.1"
                        >
                    </div>

                    <div class="field">
                        <label for="waist">Waist</label>

                        <input
                            id="waist"
                            type="number"
                            step="0.1"
                        >
                    </div>

                </div>

                <div class="two-column">

                    <div class="field">
                        <label for="height-feet">Height — ft</label>

                        <input
                            id="height-feet"
                            type="number"
                        >
                    </div>

                    <div class="field">
                        <label for="height-inches">Height — in</label>

                        <input
                            id="height-inches"
                            type="number"
                        >
                    </div>

                </div>

                <div class="two-column">

                    <div class="field">
                        <label for="age">Age</label>

                        <input
                            id="age"
                            type="number"
                        >
                    </div>

                    <div class="field">
                        <label for="sex">Sex</label>

                        <select id="sex">
                            <option value="">Choose</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                </div>

            </fieldset>

            <hr class="form-divider">

            <fieldset>

                <legend>Lifestyle Checklist</legend>

                <div class="quiz-group">

                    <p class="quiz-heading">Sleep Quality</p>

                    <div class="quiz-options">

                        <label>
                            <input
                                type="radio"
                                name="sleep"
                                value="2"
                            >
                            7–8 hours
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="sleep"
                                value="1"
                            >
                            6 hours
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="sleep"
                                value="0"
                            >
                            Less than 6
                        </label>

                    </div>

                </div>

                <div class="quiz-group">

                    <p class="quiz-heading">Hydration</p>

                    <div class="quiz-options">

                        <label>
                            <input
                                type="radio"
                                name="hydration"
                                value="2"
                            >
                            High
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="hydration"
                                value="1"
                            >
                            Adequate
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="hydration"
                                value="0"
                            >
                            Low
                        </label>

                    </div>

                </div>

                <div class="quiz-group">

                    <p class="quiz-heading">Activity Level</p>

                    <div class="quiz-options">

                        <label>
                            <input
                                type="radio"
                                name="activity"
                                value="2"
                            >
                            8k+ steps/day
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="activity"
                                value="1"
                            >
                            3–4k steps/day
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="activity"
                                value="0"
                            >
                            Less than 3k
                        </label>

                    </div>

                </div>

            </fieldset>

            <button
                type="submit"
                class="submit-btn"
            >
                Save My Info
            </button>

        </form>

    </aside>

    <script src="/dashboard/script.js"></script>

</body>
</html>
